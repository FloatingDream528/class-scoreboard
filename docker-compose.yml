version: "3.8"

services:
  scoreboard:
    image: ghcr.io/floatingdream528/class-scoreboard:latest
    container_name: class-scoreboard
    restart: unless-stopped
    ports:
      - "3000:3000"
    volumes:
      - scoreboard-data:/app/data
    environment:
      - NODE_ENV=production
      - PORT=3000
      - ACCESS_PASSWORD=your_password_here  # 改成你的访问密码，留空则不启用

volumes:
  scoreboard-data:
